# ─────────────────────────────────────────────────────────────────────────
# Observability stack for the whole platform (M13): Prometheus (metrics) +
# Alertmanager (alert routing) + Grafana (dashboards, provisioned) + Loki +
# Promtail (log aggregation) + Tempo (distributed tracing).
#
# Same split as docker-compose.infra.yml / docker-compose.yml (D56) — this file
# adds only the observability containers, not a second copy of anything else.
# Not a standalone compose project: joins the same `paymentflow` network the
# other two files already define, and Promtail's Docker service discovery
# needs the other containers to already exist. Always run merged with both
# other files via multiple -f flags:
#
#   Full stack (infra + apps + observability):
#     docker compose -f docker-compose.infra.yml -f docker-compose.yml \
#       -f docker-compose.observability.yml up -d --build
#
#   Observability only, against an already-running app stack:
#     docker compose -f docker-compose.infra.yml -f docker-compose.yml \
#       -f docker-compose.observability.yml up -d prometheus alertmanager grafana loki promtail tempo
#
# Every config file is bind-mounted read-only from observability/ — nothing is
# baked into a custom image, matching this project's "nothing baked in, only
# env vars/mounted config differ per environment" convention.
# ─────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: paymentflow-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - paymentflow

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: paymentflow-alertmanager
    restart: unless-stopped
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - paymentflow

  loki:
    image: grafana/loki:3.3.2
    container_name: paymentflow-loki
    restart: unless-stopped
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - paymentflow

  promtail:
    image: grafana/promtail:3.3.2
    container_name: paymentflow-promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - paymentflow

  tempo:
    image: grafana/tempo:2.6.1
    container_name: paymentflow-tempo
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    command:
      - -config.file=/etc/tempo.yml
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    networks:
      - paymentflow

  # ── Infra-metric exporters (M14) ─────────────────────────────────────────
  # Micrometer/HikariCP only instrument the *client* side (connection pool
  # stats, command latency) — real server-side infra metrics (Redis's own
  # ops/sec and memory, Postgres's own transaction/cache-hit stats, Kafka's
  # own broker-level throughput and consumer-group lag) need a dedicated
  # exporter scraping each tool's own native stats interface. Standard,
  # widely-used single-purpose sidecars, not custom-built.
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: paymentflow-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-paymentflow}
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - paymentflow

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: paymentflow-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-paymentflow}:${POSTGRES_PASSWORD:-paymentflow}@postgres:5432/${POSTGRES_DB:-paymentflow}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    networks:
      - paymentflow

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: paymentflow-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:19092
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    networks:
      - paymentflow

  grafana:
    image: grafana/grafana:11.4.0
    container_name: paymentflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-paymentflow}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - paymentflow

volumes:
  prometheus-data:
    name: paymentflow-prometheus-data
  loki-data:
    name: paymentflow-loki-data
  tempo-data:
    name: paymentflow-tempo-data
  grafana-data:
    name: paymentflow-grafana-data

networks:
  paymentflow:
    name: paymentflow-network
    driver: bridge
