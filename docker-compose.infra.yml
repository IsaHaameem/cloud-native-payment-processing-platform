# ─────────────────────────────────────────────────────────────────────────
# Local INFRASTRUCTURE only (Postgres, Redis, Kafka, Kafka-UI).
# Application services get their own compose file in a later phase; keeping
# infra separate gives a fast inner loop (bring infra up once, restart apps freely).
#
#   Start:  docker compose -f docker-compose.infra.yml up -d
#   Stop:   docker compose -f docker-compose.infra.yml down
#   Reset:  docker compose -f docker-compose.infra.yml down -v   (wipes volumes)
#
# Configuration comes from a local .env file (copy from .env.example).
# ─────────────────────────────────────────────────────────────────────────

name: paymentflow-infra

services:
  postgres:
    image: postgres:17-alpine
    container_name: paymentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paymentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paymentflow}
      POSTGRES_DB: ${POSTGRES_DB:-paymentflow}
      # Fail container build if a superuser password is empty (defensive).
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      # Published on a dedicated paymentflow range so this stack coexists with
      # other local Postgres instances. Internal container port stays standard.
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # One schema per service is created on first boot (schema-per-service).
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paymentflow} -d ${POSTGRES_DB:-paymentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - paymentflow

  redis:
    image: redis:8-alpine
    container_name: paymentflow-redis
    restart: unless-stopped
    # Password-protected + AOF persistence enabled.
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-paymentflow}
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-paymentflow} --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - paymentflow

  kafka:
    image: apache/kafka:3.9.0
    container_name: paymentflow-kafka
    restart: unless-stopped
    ports:
      # Host clients connect on ${KAFKA_PORT}; in-cluster clients use kafka:19092.
      # The published port and the advertised PLAINTEXT_HOST port MUST match, or
      # a host client would be redirected to an unreachable port after bootstrap.
      - "${KAFKA_PORT:-59092}:${KAFKA_PORT:-59092}"
    environment:
      # ── KRaft single-node (combined broker + controller) ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Single-node combined-mode voter references the local controller listener.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Three listeners: internal (containers), controller, and host.
      # Empty-host form (://:port) binds all interfaces; the literal 0.0.0.0 form
      # is rejected by this image's storage-format validation.
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:${KAFKA_PORT:-59092}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-59092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # Single-node replication factors.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Production-correct: topics are created explicitly, never implicitly.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # Probe the always-present internal listener (independent of host port config).
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - paymentflow

  kafka-ui:
    image: kafbat/kafka-ui:v1.1.0
    container_name: paymentflow-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: paymentflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - paymentflow

networks:
  paymentflow:
    name: paymentflow-network
    driver: bridge

volumes:
  postgres-data:
    name: paymentflow-postgres-data
  redis-data:
    name: paymentflow-redis-data
  kafka-data:
    name: paymentflow-kafka-data
