spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          # Applies to every route below — added once here rather than repeated per
          # route now that there's more than one (D22 follow-through: keep routes
          # declarative and free of copy-pasted filter blocks as services are added).
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${paymentflow.gateway.rate-limit.replenish-rate}
                redis-rate-limiter.burstCapacity: ${paymentflow.gateway.rate-limit.burst-capacity}
                redis-rate-limiter.requestedTokens: ${paymentflow.gateway.rate-limit.requested-tokens}
                key-resolver: "#{@rateLimitKeyResolver}"
          routes:
            - id: identity-service
              uri: ${paymentflow.services.identity.base-uri}
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/oauth2/jwks
            - id: merchant-service
              uri: ${paymentflow.services.merchant.base-uri}
              predicates:
                - Path=/api/v1/merchants/**
            - id: payment-service
              uri: ${paymentflow.services.payment.base-uri}
              predicates:
                - Path=/api/v1/payments/**
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production.
      host: localhost
      port: 56379
      password: paymentflow

server:
  port: 8080

paymentflow:
  services:
    identity:
      base-uri: http://localhost:8081
      jwks-uri: ${paymentflow.services.identity.base-uri}/oauth2/jwks
      issuer: https://identity.paymentflow.local
    merchant:
      base-uri: http://localhost:8082
    payment:
      base-uri: http://localhost:8083
  gateway:
    cors:
      allowed-origins: http://localhost:3000
    rate-limit:
      replenish-rate: 20
      burst-capacity: 40
      requested-tokens: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        # Prometheus (pull-based scrape) is this platform's metrics backend;
        # the OTel starter also auto-enables an OTLP metrics push exporter by
        # default, which has no receiver configured (Tempo only ingests traces)
        # and was found spamming connection-refused retries in every service's
        # logs during verification. Tracing export stays enabled below.
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          # Local default points at the compose Tempo. Overridden by
          # MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT in containers.
          endpoint: http://localhost:4318/v1/traces

# M13 closes the gap M3's own note here used to describe: Micrometer Tracing's
# context-propagation library bridges Reactor Context -> MDC automatically once the
# tracing bridge is on the classpath (no custom filter/webfilter code needed), so
# traceId/spanId now populate correctly even though WebFlux isn't thread-bound per
# request. correlationId/requestId still come from CorrelationIdWebFilter (D25) — that
# part was already correct, just not tied to a trace/span pair until now.
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-},requestId=%X{requestId:-},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
