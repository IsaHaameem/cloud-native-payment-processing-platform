spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          # Applies to every route below — added once here rather than repeated per
          # route now that there's more than one (D22 follow-through: keep routes
          # declarative and free of copy-pasted filter blocks as services are added).
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${paymentflow.gateway.rate-limit.replenish-rate}
                redis-rate-limiter.burstCapacity: ${paymentflow.gateway.rate-limit.burst-capacity}
                redis-rate-limiter.requestedTokens: ${paymentflow.gateway.rate-limit.requested-tokens}
                key-resolver: "#{@rateLimitKeyResolver}"
          routes:
            - id: identity-service
              uri: ${paymentflow.services.identity.base-uri}
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/oauth2/jwks
            - id: merchant-service
              uri: ${paymentflow.services.merchant.base-uri}
              predicates:
                - Path=/api/v1/merchants/**
            - id: payment-service
              uri: ${paymentflow.services.payment.base-uri}
              predicates:
                - Path=/api/v1/payments/**
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production.
      host: localhost
      port: 56379
      password: paymentflow

server:
  port: 8080

paymentflow:
  services:
    identity:
      base-uri: http://localhost:8081
      jwks-uri: ${paymentflow.services.identity.base-uri}/oauth2/jwks
      issuer: https://identity.paymentflow.local
    merchant:
      base-uri: http://localhost:8082
    payment:
      base-uri: http://localhost:8083
  gateway:
    cors:
      allowed-origins: http://localhost:3000
    rate-limit:
      replenish-rate: 20
      burst-capacity: 40
      requested-tokens: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# NOTE: unlike the servlet services, MDC is not auto-populated with correlationId/requestId
# here — WebFlux isn't thread-bound per request, so common-lib's MDC-based log pattern
# doesn't apply without Reactor Context propagation (Micrometer Observation, deferred to
# M13). CorrelationIdWebFilter still guarantees the header crosses the wire correctly to
# downstream services, which is the actual cross-service requirement for M3.
