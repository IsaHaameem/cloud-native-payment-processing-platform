spring:
  application:
    name: identity-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: identity
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: identity
    default-schema: identity
    locations: classpath:db/migration

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

paymentflow:
  security:
    jwt:
      issuer: https://identity.paymentflow.local
      access-token-ttl: 15m
      refresh-token-ttl: 7d
      # private-key / public-key intentionally unset for local dev: an ephemeral RSA
      # keypair is generated at startup. In production these come from Secrets Manager.

# Correlation & request ids (populated by common-lib's filter) surface on every log line.
logging:
  pattern:
    level: "%5p [%X{correlationId:-},%X{requestId:-}]"
