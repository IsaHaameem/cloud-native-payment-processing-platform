spring:
  application:
    name: identity-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: identity
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: identity
    default-schema: identity
    locations: classpath:db/migration
  kafka:
    # Local default points at the compose Kafka's host-published listener. Mirrors
    # payment-service's M5 KafkaProducerConfig exactly (M15: identity-service becomes
    # a Kafka producer for the first time).
    bootstrap-servers: localhost:59092
    producer:
      acks: all

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      # 100% sampling — this platform's demo/portfolio traffic volume makes head-based
      # sampling loss a bigger problem than trace-storage cost, unlike a real
      # production deployment. Revisit if M14's load testing shows otherwise.
      probability: 1.0
  otlp:
    metrics:
      export:
        # Prometheus (pull-based scrape) is this platform's metrics backend;
        # the OTel starter also auto-enables an OTLP metrics push exporter by
        # default, which has no receiver configured (Tempo only ingests traces)
        # and was found spamming connection-refused retries in every service's
        # logs during verification. Tracing export stays enabled below.
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          # Local default points at the compose Tempo. Overridden by
          # MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT in containers.
          endpoint: http://localhost:4318/v1/traces

paymentflow:
  security:
    jwt:
      issuer: https://identity.paymentflow.local
      access-token-ttl: 15m
      refresh-token-ttl: 7d
      # private-key / public-key intentionally unset for local dev: an ephemeral RSA
      # keypair is generated at startup. In production these come from Secrets Manager.
  outbox:
    relay-interval-ms: 2000
  identity:
    action-link:
      # No frontend exists yet (the developer portal is M23+) — points at where one
      # eventually will, so the link shape and this property never have to change.
      base-url: http://localhost:3000
    tokens:
      email-verification-ttl: 24h
      password-reset-ttl: 1h
  internal-context:
    # The HMAC secret every service uses to verify a gateway-asserted merchant context
    # (M15, D100/D118). identity-service hosts the same InternalContextFilter as every
    # other servlet service (common-lib's SERVLET-conditional autoconfig) even though
    # nothing routes /v1/** to it yet — harmless: the filter no-ops on any request
    # carrying no X-PF-Internal-* headers, exactly like every request identity-service
    # receives today.
    secret: ${PAYMENTFLOW_INTERNAL_CONTEXT_SECRET:dev-only-insecure-shared-secret-change-me}
    max-clock-skew-seconds: 30

# Correlation/request ids (common-lib's filter) and trace/span ids (Micrometer
# Tracing, M13) surface on every log line — the trace/span pair is what actually
# correlates a log line to a Tempo trace and to other services' logs for the same
# request in Grafana (Loki's derived-fields trace-id link).
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-},requestId=%X{requestId:-},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
