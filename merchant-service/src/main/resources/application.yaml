spring:
  application:
    name: merchant-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: merchant
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: merchant
    default-schema: merchant
    locations: classpath:db/migration
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production.
      host: localhost
      port: 56379
      password: paymentflow
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  kafka:
    # Local default points at the compose Kafka's host-published listener. Mirrors
    # payment-service's M5 KafkaProducerConfig exactly (M15: merchant-service becomes
    # a Kafka producer for the first time, publishing merchant.events via the same
    # transactional-outbox shape).
    bootstrap-servers: localhost:59092
    producer:
      acks: all

server:
  port: 8082

paymentflow:
  services:
    identity:
      jwks-uri: http://localhost:8081/oauth2/jwks
      issuer: https://identity.paymentflow.local
  merchant:
    api-key:
      # Old key keeps authenticating for this long after a rotate-with-grace call —
      # long enough to roll a deployed secret without a dropped-request window.
      rotation-grace-period: 24h
      # last_used_at is written at most once per key per this window (M15 task 2's
      # explicit "never one UPDATE per request" constraint), via a short-TTL Redis marker.
      last-used-throttle: 60s
  internal-context:
    # The HMAC secret every service uses to verify a gateway-asserted merchant context
    # (M15, D100/D118) — one shared secret, sourced from Secrets Manager in AWS,
    # env var locally. This is a local-dev-only default; never used as-is in AWS.
    secret: ${PAYMENTFLOW_INTERNAL_CONTEXT_SECRET:dev-only-insecure-shared-secret-change-me}
    max-clock-skew-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        # Prometheus (pull-based scrape) is this platform's metrics backend;
        # the OTel starter also auto-enables an OTLP metrics push exporter by
        # default, which has no receiver configured (Tempo only ingests traces)
        # and was found spamming connection-refused retries in every service's
        # logs during verification. Tracing export stays enabled below.
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          # Local default points at the compose Tempo. Overridden by
          # MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT in containers.
          endpoint: http://localhost:4318/v1/traces

# Correlation/request ids (common-lib's filter) and trace/span ids (Micrometer
# Tracing, M13) surface on every log line.
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-},requestId=%X{requestId:-},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
