spring:
  application:
    name: merchant-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: merchant
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: merchant
    default-schema: merchant
    locations: classpath:db/migration
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production.
      host: localhost
      port: 56379
      password: paymentflow
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

server:
  port: 8082

paymentflow:
  services:
    identity:
      jwks-uri: http://localhost:8081/oauth2/jwks
      issuer: https://identity.paymentflow.local

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# Correlation & request ids (populated by common-lib's filter) surface on every log line.
logging:
  pattern:
    level: "%5p [%X{correlationId:-},%X{requestId:-}]"
