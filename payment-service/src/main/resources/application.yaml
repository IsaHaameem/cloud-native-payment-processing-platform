spring:
  application:
    name: payment-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: payment
    default-schema: payment
    locations: classpath:db/migration
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production. Backs the
      # idempotency-key lock only in this service (no caching here, unlike merchant-service).
      host: localhost
      port: 56379
      password: paymentflow
  kafka:
    # Local default points at the compose Kafka's host-published listener.
    # KafkaProducerConfig builds its own KafkaTemplate<String,String> with explicit
    # StringSerializer instances (Boot's autoconfigured template is type-erased to
    # <Object,Object> and can't satisfy that dependency) — the outbox row already
    # holds a fully-serialized JSON string, shipped to Kafka as-is.
    bootstrap-servers: localhost:59092
    producer:
      acks: all

server:
  port: 8083

paymentflow:
  services:
    identity:
      jwks-uri: http://localhost:8081/oauth2/jwks
      issuer: https://identity.paymentflow.local
    merchant:
      base-uri: http://localhost:8082
  outbox:
    relay-interval-ms: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# Correlation & request ids (populated by common-lib's filter) surface on every log line.
logging:
  pattern:
    level: "%5p [%X{correlationId:-},%X{requestId:-}]"
