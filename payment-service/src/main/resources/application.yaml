spring:
  application:
    name: payment-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: payment
    default-schema: payment
    locations: classpath:db/migration
  data:
    redis:
      # Local default points at the compose Redis (host port 56379). Overridden by
      # SPRING_DATA_REDIS_* env vars in containers / production. Backs the
      # idempotency-key lock only in this service (no caching here, unlike merchant-service).
      host: localhost
      port: 56379
      password: paymentflow
  kafka:
    # Local default points at the compose Kafka's host-published listener.
    # KafkaProducerConfig builds its own KafkaTemplate<String,String> with explicit
    # StringSerializer instances (Boot's autoconfigured template is type-erased to
    # <Object,Object> and can't satisfy that dependency) — the outbox row already
    # holds a fully-serialized JSON string, shipped to Kafka as-is.
    bootstrap-servers: localhost:59092
    producer:
      acks: all

server:
  port: 8083

paymentflow:
  services:
    identity:
      jwks-uri: http://localhost:8081/oauth2/jwks
      issuer: https://identity.paymentflow.local
    merchant:
      base-uri: http://localhost:8082
  outbox:
    relay-interval-ms: 2000
  resilience:
    merchant-service:
      # Hard Feign socket timeouts (FeignClientConfig) — deliberately under
      # timelimiter.instances.merchantService.timeout-duration below, so the socket
      # itself gives up before the app-level TimeLimiter would need to.
      connect-timeout-ms: 1000
      read-timeout-ms: 1500
      # Exponential-backoff-with-jitter parameters (MerchantResilienceConfig's
      # RetryConfigCustomizer) — plain resilience4j.retry.* YAML can't express both
      # exponential growth and jitter together (D50).
      retry-initial-interval-ms: 200
      retry-multiplier: 2.0
      retry-randomization-factor: 0.5

resilience4j:
  circuitbreaker:
    instances:
      merchantService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        # Require a meaningful sample before judging failure rate — avoids flapping
        # OPEN on the first handful of calls after a cold start.
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        # A call that merely runs slowly (but doesn't hit the TimeLimiter's harder
        # cutoff below) also degrades the breaker's health signal, not just outright
        # exceptions — real merchant-service degradation is rarely all-or-nothing.
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - feign.RetryableException
          - feign.FeignException$FeignServerException
          - java.util.concurrent.TimeoutException
        # A 4xx from merchant-service (or the already-handled not-onboarded case) is
        # a client-side outcome, not a merchant-service health signal — must never
        # count toward opening the circuit (see D51). BulkheadFullException must be
        # ignored too, not merely left off recordExceptions: resilience4j treats any
        # exception matching neither list as a SUCCESS once recordExceptions is
        # non-empty — leaving it off would make sustained bulkhead saturation look
        # like a 100% healthy merchant-service to the circuit breaker (a real gap
        # found via testing, not a hypothetical — see the M8 changelog's Problems).
        ignoreExceptions:
          - com.paymentflow.payment.exception.MerchantNotOnboardedException
          - feign.FeignException$FeignClientException
          - io.github.resilience4j.bulkhead.BulkheadFullException
  retry:
    instances:
      merchantService:
        maxAttempts: 3
        # Base wait before MerchantResilienceConfig's RetryConfigCustomizer applies
        # exponential-backoff-with-jitter on top; harmless if the customizer runs
        # first, kept for clarity of intent.
        waitDuration: 200ms
        retryExceptions:
          - feign.RetryableException
          - feign.FeignException$FeignServerException
          - java.util.concurrent.TimeoutException
        # Same "never retry a client error" rule as the circuit breaker above — a 4xx
        # will never be different on the next attempt without the request itself
        # changing (D51). BulkheadFullException is deliberately absent too: retrying
        # into an already-saturated bulkhead undermines the whole point of shedding
        # load rather than piling more of it on.
        ignoreExceptions:
          - com.paymentflow.payment.exception.MerchantNotOnboardedException
          - feign.FeignException$FeignClientException
  thread-pool-bulkhead:
    instances:
      merchantService:
        coreThreadPoolSize: 5
        maxThreadPoolSize: 10
        queueCapacity: 10
        keepAliveDuration: 20ms
  timelimiter:
    instances:
      merchantService:
        timeoutDuration: 2s
        cancelRunningFuture: true

management:
  endpoints:
    web:
      exposure:
        # "metrics" added in M8 so Resilience4j's Micrometer-bound meters
        # (resilience4j.circuitbreaker.*, .retry.*, .bulkhead.*, .timelimiter.*) are
        # browsable; M13 finally gave them a real Prometheus registry to land in.
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        # Prometheus (pull-based scrape) is this platform's metrics backend;
        # the OTel starter also auto-enables an OTLP metrics push exporter by
        # default, which has no receiver configured (Tempo only ingests traces)
        # and was found spamming connection-refused retries in every service's
        # logs during verification. Tracing export stays enabled below.
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          # Local default points at the compose Tempo. Overridden by
          # MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT in containers.
          endpoint: http://localhost:4318/v1/traces

# Correlation/request ids (common-lib's filter) and trace/span ids (Micrometer
# Tracing, M13) surface on every log line.
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-},requestId=%X{requestId:-},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
