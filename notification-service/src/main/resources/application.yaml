spring:
  application:
    name: notification-service
  datasource:
    # Local default points at the compose Postgres (host port 55432). Overridden by
    # SPRING_DATASOURCE_* env vars in containers / production.
    url: jdbc:postgresql://localhost:55432/paymentflow
    username: paymentflow
    password: paymentflow
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates it.
    open-in-view: false
    properties:
      hibernate:
        default_schema: notification
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: notification
    default-schema: notification
    locations: classpath:db/migration
  kafka:
    # Local default points at the compose Kafka's host-published listener.
    bootstrap-servers: localhost:59092
    consumer:
      group-id: notification-service-payment.events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8092

paymentflow:
  kafka:
    payment-events-topic: payment.events
    # Matches payment.events' partition count (KafkaTopicConfig in payment-service) so
    # every partition can be consumed in parallel within this one consumer group.
    listener-concurrency: 3
    # M15: identity.events — a distinct group id from the default payment.events one
    # above (D5's naming convention), set explicitly on IdentityEventListener's
    # @KafkaListener rather than relying on spring.kafka.consumer.group-id (which is
    # already claimed by the default listener container factory for payment.events).
    identity-events-topic: identity.events
    identity-events-group-id: notification-service-identity.events
  internal-context:
    # Every servlet service hosts common-lib's InternalContextFilter (SERVLET-
    # conditional autoconfig, M15) — harmless here: nothing routes /v1/** to
    # notification-service, so the filter always no-ops (D100/D118).
    secret: ${PAYMENTFLOW_INTERNAL_CONTEXT_SECRET:dev-only-insecure-shared-secret-change-me}
    max-clock-skew-seconds: 30
  notification:
    retry-topic: payment.events.retry
    retry-group-id: notification-service-payment.events.retry
    retry-listener-concurrency: 3
    dlq-topic: payment.events.dlq
    webhook-connect-timeout-ms: 3000
    webhook-read-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        # Prometheus (pull-based scrape) is this platform's metrics backend;
        # the OTel starter also auto-enables an OTLP metrics push exporter by
        # default, which has no receiver configured (Tempo only ingests traces)
        # and was found spamming connection-refused retries in every service's
        # logs during verification. Tracing export stays enabled below.
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          # Local default points at the compose Tempo. Overridden by
          # MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT in containers.
          endpoint: http://localhost:4318/v1/traces

# Correlation/request ids (common-lib's filter) and trace/span ids (Micrometer
# Tracing, M13) surface on every log line.
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId:-},requestId=%X{requestId:-},traceId=%X{traceId:-},spanId=%X{spanId:-}]"
